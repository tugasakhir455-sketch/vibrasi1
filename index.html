<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Monitoring Vibrasi Motor</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans antialiased">

    <div class="container mx-auto px-4 py-8">
        <header class="mb-8 text-center md:text-left">
            <h1 class="text-3xl font-extrabold tracking-tight text-blue-400">MONITORING VIBRASI BEARING MOTOR</h1>
            <p class="text-gray-400">Sistem Pemantauan Realtime & Pengunduhan Laporan</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6 mb-8">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg flex flex-col justify-between">
                <span class="text-sm font-medium text-gray-400 uppercase">Status Motor</span>
                <span id="status-motor" class="text-2xl font-black mt-2 text-gray-500">MEMUAT...</span>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <span class="text-sm font-medium text-gray-400 uppercase">Total RMS</span>
                <div class="text-4xl font-bold mt-2 text-blue-400" id="val-rms">0.000</div>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <span class="text-sm font-medium text-gray-400 uppercase">RMS Sumbu X</span>
                <div class="text-4xl font-bold mt-2 text-emerald-400" id="val-x">0.000</div>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <span class="text-sm font-medium text-gray-400 uppercase">RMS Sumbu Y</span>
                <div class="text-4xl font-bold mt-2 text-amber-400" id="val-y">0.000</div>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <span class="text-sm font-medium text-gray-400 uppercase">RMS Sumbu Z</span>
                <div class="text-4xl font-bold mt-2 text-rose-400" id="val-z">0.000</div>
            </div>
        </div>

        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg mb-8">
            <h2 class="text-xl font-bold mb-4 text-gray-200">Grafik Getaran Realtime</h2>
            <div class="relative h-96 w-full">
                <canvas id="vibrationChart"></canvas>
            </div>
        </div>

        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
            <h2 class="text-xl font-bold mb-4 text-gray-200">Unduh Laporan Riwayat Vibrasi (Excel)</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <button onclick="downloadExcel('harian')" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors shadow">📦 Data Harian</button>
                <button onclick="downloadExcel('mingguan')" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors shadow">🗓️ Data Mingguan</button>
                <button onclick="downloadExcel('bulanan')" class="bg-amber-600 hover:bg-amber-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors shadow">📅 Data Bulanan</button>
                <button onclick="downloadExcel('tahunan')" class="bg-rose-600 hover:bg-rose-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors shadow">📊 Data Tahunan</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3LlOLeNIenL2btxg9W_zX21jdKRVmbf4",
            authDomain: "dht22-b2230.firebaseapp.com",
            databaseURL: "https://dht22-b2230-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dht22-b2230",
            storageBucket: "dht22-b2230.firebasestorage.app",
            messagingSenderId: "774855203635",
            appId: "1:774855203635:web:6f43abc6455b67c8607c46"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let dataLog = JSON.parse(localStorage.getItem('vibration_logs')) || [];

        // INIT CHART
        const ctx = document.getElementById('vibrationChart').getContext('2d');
        const vibrationChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'Total RMS', data: [], borderColor: '#60a5fa', tension: 0.2, fill: false },
                    { label: 'Sumbu X', data: [], borderColor: '#34d399', tension: 0.2, fill: false },
                    { label: 'Sumbu Y', data: [], borderColor: '#fbbf24', tension: 0.2, fill: false },
                    { label: 'Sumbu Z', data: [], borderColor: '#f87171', tension: 0.2, fill: false }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { grid: { color: '#374151' }, ticks: { color: '#9ca3af' } },
                    y: { grid: { color: '#374151' }, ticks: { color: '#9ca3af' } }
                },
                plugins: { legend: { labels: { color: '#f3f4f6' } } }
            }
        });

        // 1. DIATUR KE PATH 'Vibrasi' SESUAI SCREENSHOT DATABASE ANDA
        const vibrasiRef = ref(db, 'Vibrasi');

        onValue(vibrasiRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const now = new Date();
                const timeString = now.toLocaleTimeString('id-ID');

                // 2. DISESUAIKAN KEY-NYA DENGAN SCREENSHOT FIREBASE CONSOLE ANDA
                const totalRMS = data.totalRMS !== undefined ? Number(data.totalRMS) : 0;
                const rmsX = data.rms_x !== undefined ? Number(data.rms_x) : 0;
                const rmsY = data.rms_y !== undefined ? Number(data.rms_y) : 0;
                const rmsZ = data.rms_z !== undefined ? Number(data.rms_z) : 0;
                const statusMotor = data.kondisi || "UNKNOWN";

                // Update Angka UI (Menggunakan 5 angka di belakang koma karena nilai getaran Anda sangat kecil)
                document.getElementById('val-rms').innerText = totalRMS.toFixed(5);
                document.getElementById('val-x').innerText = rmsX.toFixed(5);
                document.getElementById('val-y').innerText = rmsY.toFixed(5);
                document.getElementById('val-z').innerText = rmsZ.toFixed(5);

                // Update Status Card
                const statusEl = document.getElementById('status-motor');
                statusEl.innerText = statusMotor;
                statusEl.className = "text-2xl font-black mt-2 " + 
                    (statusMotor === "NORMAL" ? "text-emerald-400" : statusMotor === "WARNING" ? "text-amber-400" : "text-rose-500");

                // Update Chart
                if (vibrationChart.data.labels.length > 20) {
                    vibrationChart.data.labels.shift();
                    vibrationChart.data.datasets.forEach(d => d.data.shift());
                }
                vibrationChart.data.labels.push(timeString);
                vibrationChart.data.datasets[0].data.push(totalRMS);
                vibrationChart.data.datasets[1].data.push(rmsX);
                vibrationChart.data.datasets[2].data.push(rmsY);
                vibrationChart.data.datasets[3].data.push(rmsZ);
                vibrationChart.update();

                // Simpan Data Log untuk Excel
                dataLog.push({ Waktu: now.toISOString(), Total_RMS: totalRMS, RMS_X: rmsX, RMS_Y: rmsY, RMS_Z: rmsZ, Status: statusMotor });
                if (dataLog.length > 5000) dataLog.shift();
                localStorage.setItem('vibration_logs', JSON.stringify(dataLog));
            }
        });

        window.downloadExcel = function(tipe) {
            if (dataLog.length === 0) { alert("Data kosong! Tunggu data masuk terlebih dahulu."); return; }
            const worksheet = XLSX.utils.json_to_sheet(dataLog);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Data Vibrasi");
            XLSX.writeFile(workbook, `Laporan_Vibrasi_${tipe}.xlsx`);
        };
    </script>
</body>
</html>
